name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: windows-latest / node20
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 20（启用 npm cache）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 安装依赖（npm ci）
        run: npm ci

      - name: 代码风格检查（lint）
        run: npm run lint

      - name: 单元测试（test）
        run: npm run test

      - name: 类型检查（typecheck）
        run: npm run typecheck

      - name: 构建（build）
        run: npm run build

      - name: 上传证据与构建产物（artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .sisyphus/evidence/
            dist/
